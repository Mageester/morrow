  <text x="290" y="263" fill="#475569" font-size="9" text-anchor="middle" font-family="Arial">task-event-adapter.ts</text>

  <rect x="30" y="200" width="140" height="70" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
