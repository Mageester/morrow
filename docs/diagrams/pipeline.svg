  <rect x="190" y="360" width="14" height="10" rx="2" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/><text x="210" y="369" fill="#94a3b8" font-size="9" font-family="Arial">State</text>
  <rect x="260" y="360" width="14" height="10" rx="2" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/><text x="280" y="369" fill="#94a3b8" font-size="9" font-family="Arial">Adapter</text>
  <rect x="340" y="360" width="14" height="10" rx="2" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/><text x="360" y="369" fill="#94a3b8" font-size="9" font-family="Arial">Grouper</text>
