  <text x="100" y="248" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="Arial">REST + SSE</text>
  <text x="100" y="263" fill="#475569" font-size="9" text-anchor="middle" font-family="Arial">services/orchestrator</text>

