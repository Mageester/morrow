  </defs>
  <rect width="800" height="420" fill="#0f172a" rx="12"/>
  <text x="400" y="35" fill="white" font-size="18" font-weight="bold" text-anchor="middle" font-family="Arial">Event-Driven Terminal Pipeline</text>
  <text x="400" y="55" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="Arial">No path from producer to screen bypasses an event</text>

  <rect x="30" y="80" width="140" height="70" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
