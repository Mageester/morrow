<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker></defs>
  <rect width="800" height="440" fill="#0f172a" rx="12"/>
  <text x="400" y="35" fill="white" font-size="18" font-weight="bold" text-anchor="middle" font-family="Arial">Approval &amp; Permission Flow</text>
  <rect x="300" y="60" width="200" height="44" rx="22" fill="#1e3a5f" stroke="#22d3ee" stroke-width="2"/>
  <text x="400" y="87" fill="#22d3ee" font-size="13" font-weight="bold" text-anchor="middle" font-family="Arial">Command / Patch Proposed</text>
  <polygon points="400,130 530,180 400,230 270,180" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="400" y="175" fill="#fbbf24" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">YOLO?</text>
  <text x="400" y="190" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="Arial">in scope?</text>
  <text x="555" y="172" fill="#34d399" font-size="11" font-family="Arial">YES</text>
  <line x1="530" y1="180" x2="600" y2="180" stroke="#34d399" stroke-width="2" marker-end="url(#a)"/>
  <rect x="580" y="60" width="150" height="44" rx="8" fill="#14532d" stroke="#34d399" stroke-width="1.5"/>
  <text x="655" y="82" fill="#34d399" font-size="12" font-weight="bold" text-anchor="middle" font-family="Arial">Auto-Approved</text>
  <text x="655" y="98" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="Arial">Routine project work</text>
  <rect x="580" y="120" width="150" height="75" rx="6" fill="#450a0a" fill-opacity="0.5" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="655" y="138" fill="#ef4444" font-size="9" font-weight="bold" text-anchor="middle" font-family="Arial">HARD BLOCKS</text>
  <text x="655" y="154" fill="#94a3b8" font-size="7" text-anchor="middle" font-family="Arial">Secrets · Escapes ·</text>
  <text x="655" y="168" fill="#94a3b8" font-size="7" text-anchor="middle" font-family="Arial">Privilege · Force Push</text>
  <text x="655" y="182" fill="#94a3b8" font-size="7" text-anchor="middle" font-family="Arial">Destructive Git/Disk</text>
  <text x="230" y="205" fill="#ef4444" font-size="11" font-family="Arial">NO</text>
  <line x1="270" y1="180" x2="180" y2="270" stroke="#ef4444" stroke-width="2" marker-end="url(#a)"/>
  <rect x="130" y="270" width="170" height="130" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="215" y="295" fill="#fbbf24" font-size="12" font-weight="bold" text-anchor="middle" font-family="Arial">User Prompted</text>
  <text x="215" y="315" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="Arial">Risk: low / med / high</text>
  <text x="215" y="332" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="Arial">Dir + preview shown</text>
  <text x="215" y="352" fill="#fbbf24" font-size="9" text-anchor="middle" font-family="Arial">4 trust options:</text>
  <text x="215" y="370" fill="#22d3ee" font-size="8" text-anchor="middle" font-family="Arial">y=once s=session</text>
  <text x="215" y="384" fill="#22d3ee" font-size="8" text-anchor="middle" font-family="Arial">p=project n=deny</text>
  <rect x="340" y="360" width="350" height="55" rx="8" fill="#1e3a5f" fill-opacity="0.3" stroke="#22d3ee" stroke-width="1"/>
  <text x="515" y="385" fill="#22d3ee" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">Proportional Permissions</text>
  <text x="515" y="404" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="Arial">"Protect without blocking. Routine = auto. Destructive = confirm."</text>
</svg>
