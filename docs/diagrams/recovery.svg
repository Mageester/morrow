<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker></defs>
  <rect width="800" height="350" fill="#0f172a" rx="12"/>
  <text x="400" y="30" fill="white" font-size="16" font-weight="bold" text-anchor="middle" font-family="Arial">Recovery Workflow — 5 Failure Modes, 1 Recovery Path</text>

  <rect x="30" y="55" width="115" height="45" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="87" y="75" fill="#ef4444" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">✖ Failed</text>
  <text x="87" y="92" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="Arial">Build/test</text>

  <rect x="160" y="55" width="115" height="45" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="217" y="75" fill="#fbbf24" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">⚠ Interrupted</text>
  <text x="217" y="92" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="Arial">Ctrl+C</text>

  <rect x="290" y="55" width="115" height="45" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="347" y="75" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">⏸ Cancelled</text>
  <text x="347" y="92" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="Arial">User</text>

  <rect x="420" y="55" width="115" height="45" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="477" y="75" fill="#fbbf24" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">⌛ Stalled</text>
  <text x="477" y="92" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="Arial">No progress</text>

  <rect x="550" y="55" width="115" height="45" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="607" y="75" fill="#fbbf24" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">💰 Budget</text>
  <text x="607" y="92" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="Arial">Turn limit</text>

  <rect x="680" y="55" width="100" height="45" rx="8" fill="#450a0a" fill-opacity="0.4" stroke="#ef4444" stroke-width="1"/>
  <text x="730" y="75" fill="#ef4444" font-size="10" font-weight="bold" text-anchor="middle" font-family="Arial">ALL</text>
  <text x="730" y="92" fill="#94a3b8" font-size="8" text-anchor="middle" font-family="Arial">Same path</text>

  <line x1="87" y1="100" x2="87" y2="155" stroke="#94a3b8" stroke-width="1"/>
  <line x1="217" y1="100" x2="217" y2="155" stroke="#94a3b8" stroke-width="1"/>
  <line x1="347" y1="100" x2="347" y2="155" stroke="#94a3b8" stroke-width="1"/>
  <line x1="477" y1="100" x2="477" y2="155" stroke="#94a3b8" stroke-width="1"/>
  <line x1="607" y1="100" x2="607" y2="155" stroke="#94a3b8" stroke-width="1"/>
  <line x1="730" y1="100" x2="730" y2="155" stroke="#94a3b8" stroke-width="1"/>

  <rect x="30" y="155" width="750" height="55" rx="8" fill="#1e3a5f" fill-opacity="0.4" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="405" y="180" fill="#fbbf24" font-size="14" font-weight="bold" text-anchor="middle" font-family="Arial">Recovery — 5 inline next-step commands</text>
  <text x="405" y="200" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="Arial">/continue to resume · /diff to inspect · /undo to rollback · /result for details · /output to see outputs</text>

  <line x1="250" y1="210" x2="180" y2="280" stroke="#34d399" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="80" y="280" width="200" height="44" rx="8" fill="#14532d" stroke="#34d399" stroke-width="1.5"/>
  <text x="180" y="300" fill="#34d399" font-size="12" font-weight="bold" text-anchor="middle" font-family="Arial">/continue → Resumed</text>
  <text x="180" y="316" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="Arial">Picks up where it left off</text>

  <line x1="560" y1="210" x2="620" y2="280" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="520" y="280" width="200" height="44" rx="8" fill="#143C78" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="620" y="300" fill="#22d3ee" font-size="12" font-weight="bold" text-anchor="middle" font-family="Arial">/undo → Rolled Back</text>
  <text x="620" y="316" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="Arial">All changes reverted</text>
</svg>
