<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Morrow is a private, local-first personal AI agent."
    />
    <title>Morrow</title>
    <script>
      // Apply the theme before first paint to avoid a light flash in dark mode.
      // Mirrors the ThemeProvider logic: stored explicit choice wins, otherwise
      // follow the OS color-scheme preference.
      (function () {
        var theme;
        try {
          theme = window.localStorage.getItem("morrow-theme");
        } catch (error) {
          theme = null;
        }
        if (theme !== "dark" && theme !== "light") {
          try {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          } catch (error) {
            theme = "light";
          }
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
