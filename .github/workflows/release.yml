name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test

  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Package Release
        run: node scripts/package-release.mjs ${{ github.ref_name }}
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: morrow-windows-release
          path: |
            dist/Morrow-*.zip
            dist/release-manifest.json
            dist/morrow-*-checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Morrow ${{ github.ref_name }}
          body: |
            ## Morrow ${{ github.ref_name }} (Beta)

            This is an Early Access beta release. Expect breaking changes and incomplete features.

            ### Windows
            Download the portable package, extract, and run `setup.ps1` in PowerShell.

            ### Install
            1. Download `Morrow-${{ github.ref_name }}-windows-x64.zip`
            2. Extract to a permanent location
            3. Run `.\setup.ps1` in PowerShell
            4. Launch Morrow from the Start Menu or run `node morrow.mjs`

            ### Known Limitations
            - No native installer — portable package only
            - macOS and Docker support not yet available
            - Managed cloud browser not yet available
            - Write and terminal tools gated until safety boundaries ship
            - Sandboxed plugin runtime hooks incomplete

            See [RELEASE.md](https://github.com/Mageester/morrow/blob/main/docs/RELEASE.md) for full details.
          prerelease: true
          files: |
            dist/Morrow-*.zip
            dist/release-manifest.json
            dist/morrow-*-checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
