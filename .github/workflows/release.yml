name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @morrow/web lint
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
      - run: pnpm run test:e2e

  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @morrow/web lint
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
      - run: pnpm run test:e2e

      - name: Package Release
        run: node scripts/package-release.mjs ${{ github.ref_name }}
        shell: pwsh

      - name: Smoke-test the packaged runtime
        shell: pwsh
        run: |
          $package = "dist/Morrow-${{ github.ref_name }}-windows-x64"
          & "$package/runtime/node.exe" "$package/morrow.mjs" doctor

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: morrow-windows-release
          path: |
            dist/Morrow-*.zip
            dist/release-manifest.json
            dist/morrow-*-checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Morrow ${{ github.ref_name }}
          body: |
            ## Morrow ${{ github.ref_name }} (Beta)

            This is an Early Access beta release. Expect breaking changes and incomplete features.

            ### Windows
            Windows 10/11 x64 is supported. The installer verifies the published SHA-256 checksum and bundles Node 22.15.0, so it does not require Git, pnpm, Node, or a source checkout.

            ### Install
            ```powershell
            irm https://morrowproject.getaxiom.ca/install.ps1 | iex
            ```

            Alternatively, download `Morrow-${{ github.ref_name }}-windows-x64.zip`, extract it, and run `morrow.cmd`.

            ### Known Limitations
            - Unsigned beta release
            - macOS and Docker support not yet available
            - Write and terminal tools gated until safety boundaries ship
            - Skills Control Center is a preview; it shows only registry records returned by the local service

            See [RELEASE.md](https://github.com/Mageester/morrow/blob/main/docs/RELEASE.md) for full details.
          prerelease: true
          files: |
            dist/Morrow-*.zip
            dist/release-manifest.json
            dist/morrow-*-checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
