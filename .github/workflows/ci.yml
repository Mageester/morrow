name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
      # Repository-level guards (installer data-safety, version drift, installer
      # ASCII/UTF-8). pnpm check runs the validator on the real files; this also
      # exercises the negative cases so the guards can't silently rot.
      # installer-cli-only proves no browser, no localhost, no web/index.html.
      # install-activation drives the real atomic activation/rollback code paths.
      - run: node --test scripts/validate-repository.test.mjs scripts/installer-cli-only.test.mjs scripts/install-activation.test.mjs scripts/lib/package-provenance.test.mjs scripts/acceptance-foundation-smoke.test.mjs
