name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
      # Repository-level guards (installer data-safety, version drift, installer
      # ASCII/UTF-8). pnpm check runs the validator on the real files; this also
      # exercises the negative cases so the guards can't silently rot.
      - run: node --test scripts/validate-repository.test.mjs
