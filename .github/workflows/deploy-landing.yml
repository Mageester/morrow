name: Deploy Public Website

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:
  repository_dispatch:
    types: [release-published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Landing Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # Stage the public installer and the exact release metadata that the
      # installer consumes. The release workflow dispatches this job only after
      # the GitHub prerelease has published these assets.
      - name: Stage public install contract
        env:
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
        run: |
          if [ -z "$RELEASE_VERSION" ]; then
            RELEASE_VERSION="$(curl --fail --location --silent --show-error https://api.github.com/repos/Mageester/morrow/releases?per_page=100 | jq -r '[.[] | select(.prerelease and (.draft | not))][0].tag_name')"
            RELEASE_VERSION="${RELEASE_VERSION#v}"
          fi
          test -n "$RELEASE_VERSION"
          mkdir -p apps/landing/public/releases
          cp installer/install.ps1 apps/landing/public/install.ps1
          curl --fail --location --silent --show-error "https://github.com/Mageester/morrow/releases/download/v${RELEASE_VERSION}/latest.json" -o apps/landing/public/releases/latest.json
          curl --fail --location --silent --show-error "https://github.com/Mageester/morrow/releases/download/v${RELEASE_VERSION}/release-manifest.json" -o apps/landing/public/release-manifest.json

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @morrow/landing build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'apps/landing/dist'

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
