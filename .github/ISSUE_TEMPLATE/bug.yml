name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide exact steps and the smallest useful example.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Morrow version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime versions, model/provider, and relevant configuration without secrets.
  - type: textarea
    id: evidence
    attributes:
      label: Logs or evidence
      description: Remove secrets and personal data before attaching anything.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private messages, and sensitive personal data.
          required: true
