name: Feature proposal
description: Propose a user-facing capability or improvement
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the problem before proposing the implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
  - type: textarea
    id: evidence
    attributes:
      label: Success evidence
      description: How should we prove this is useful, reliable, or better?
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and permission impact
